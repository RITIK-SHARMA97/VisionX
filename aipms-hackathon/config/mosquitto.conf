# Mosquitto MQTT Broker Configuration
# Used for local development only

# Standard MQTT listener
listener 1883
protocol mqtt
allow_anonymous true

# WebSocket listener (optional)
listener 9001
protocol websockets
allow_anonymous true

# Persistence (disabled for demo)
persistence false
persistence_location /tmp/mosquitto/

# Logging
log_dest stdout
log_dest file /var/log/mosquitto/mosquitto.log
log_type all

# Security (relaxed for hackathon demo)
allow_anonymous true
max_connections -1
